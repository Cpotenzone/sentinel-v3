steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-west1-docker.pkg.dev/$PROJECT_ID/castle/sentinel-v3:$SHORT_SHA'
      - '-t'
      - 'us-west1-docker.pkg.dev/$PROJECT_ID/castle/sentinel-v3:latest'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'us-west1-docker.pkg.dev/$PROJECT_ID/castle/sentinel-v3']

images:
  - 'us-west1-docker.pkg.dev/$PROJECT_ID/castle/sentinel-v3:$SHORT_SHA'
  - 'us-west1-docker.pkg.dev/$PROJECT_ID/castle/sentinel-v3:latest'

options:
  logging: CLOUD_LOGGING_ONLY
